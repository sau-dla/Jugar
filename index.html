<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Olym Night</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow-x: hidden;
            background-color: #000;
        }

        .poster-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            z-index: 0;
            filter: brightness(0.85);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            z-index: 1;
        }

        /* ✅ LLUVIA DE ESTRELLAS */
        .shooting-star {
            position: absolute;
            top: -100px;
            width: 3px;
            height: 100px;
            background: linear-gradient(to bottom, 
                rgba(255, 255, 255, 1) 0%,
                rgba(255, 255, 255, 0.8) 50%,
                transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8),
                        0 0 40px rgba(255, 255, 255, 0.5);
            animation: fall linear infinite;
            z-index: 1;
            opacity: 0;
        }

        .shooting-star::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white, 0 0 20px white;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(45deg);
                opacity: 1;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(120vh) rotate(45deg);
                opacity: 0;
            }
        }

        /* Colores vibrantes para las estrellas */
        .star-blue { 
            background: linear-gradient(to bottom, rgba(0, 150, 255, 1) 0%, rgba(0, 150, 255, 0.8) 50%, transparent 100%);
            box-shadow: 0 0 20px rgba(0, 150, 255, 1), 0 0 40px rgba(0, 150, 255, 0.6);
        }
        .star-blue::before {
            background: rgba(0, 150, 255, 1);
            box-shadow: 0 0 10px rgba(0, 150, 255, 1), 0 0 20px rgba(0, 150, 255, 1);
        }

        .star-pink { 
            background: linear-gradient(to bottom, rgba(255, 0, 150, 1) 0%, rgba(255, 0, 150, 0.8) 50%, transparent 100%);
            box-shadow: 0 0 20px rgba(255, 0, 150, 1), 0 0 40px rgba(255, 0, 150, 0.6);
        }
        .star-pink::before {
            background: rgba(255, 0, 150, 1);
            box-shadow: 0 0 10px rgba(255, 0, 150, 1), 0 0 20px rgba(255, 0, 150, 1);
        }

        .star-yellow { 
            background: linear-gradient(to bottom, rgba(255, 200, 0, 1) 0%, rgba(255, 200, 0, 0.8) 50%, transparent 100%);
            box-shadow: 0 0 20px rgba(255, 200, 0, 1), 0 0 40px rgba(255, 200, 0, 0.6);
        }
        .star-yellow::before {
            background: rgba(255, 200, 0, 1);
            box-shadow: 0 0 10px rgba(255, 200, 0, 1), 0 0 20px rgba(255, 200, 0, 1);
        }

        .star-purple { 
            background: linear-gradient(to bottom, rgba(180, 0, 255, 1) 0%, rgba(180, 0, 255, 0.8) 50%, transparent 100%);
            box-shadow: 0 0 20px rgba(180, 0, 255, 1), 0 0 40px rgba(180, 0, 255, 0.6);
        }
        .star-purple::before {
            background: rgba(180, 0, 255, 1);
            box-shadow: 0 0 10px rgba(180, 0, 255, 1), 0 0 20px rgba(180, 0, 255, 1);
        }

        .star-cyan { 
            background: linear-gradient(to bottom, rgba(0, 255, 255, 1) 0%, rgba(0, 255, 255, 0.8) 50%, transparent 100%);
            box-shadow: 0 0 20px rgba(0, 255, 255, 1), 0 0 40px rgba(0, 255, 255, 0.6);
        }
        .star-cyan::before {
            background: rgba(0, 255, 255, 1);
            box-shadow: 0 0 10px rgba(0, 255, 255, 1), 0 0 20px rgba(0, 255, 255, 1);
        }

        .star-green { 
            background: linear-gradient(to bottom, rgba(0, 255, 100, 1) 0%, rgba(0, 255, 100, 0.8) 50%, transparent 100%);
            box-shadow: 0 0 20px rgba(0, 255, 100, 1), 0 0 40px rgba(0, 255, 100, 0.6);
        }
        .star-green::before {
            background: rgba(0, 255, 100, 1);
            box-shadow: 0 0 10px rgba(0, 255, 100, 1), 0 0 20px rgba(0, 255, 100, 1);
        }

        /* Manchas de luz en el piso */
        .floor-light {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            filter: blur(10px);
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        /* Tipografías y Estilos */
        .top-invite {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .party-title {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 0.9;
            text-transform: uppercase;
            margin-bottom: 0;
            color: #ffffff;
            text-shadow: 
                0 0 10px rgba(0, 255, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.6),
                0 0 40px rgba(0, 255, 255, 0.4),
                0 0 80px rgba(0, 255, 255, 0.2);
            animation: neon-elegant 3s ease-in-out infinite;
        }

        @keyframes neon-elegant {
            0%, 100% { 
                text-shadow: 
                    0 0 10px rgba(0, 255, 255, 0.8),
                    0 0 20px rgba(0, 255, 255, 0.6),
                    0 0 40px rgba(0, 255, 255, 0.4),
                    0 0 80px rgba(0, 255, 255, 0.2);
            }
            50% { 
                text-shadow: 
                    0 0 15px rgba(0, 255, 255, 1),
                    0 0 30px rgba(0, 255, 255, 0.8),
                    0 0 60px rgba(0, 255, 255, 0.6),
                    0 0 120px rgba(0, 255, 255, 0.4);
            }
        }

        .olym-text {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            display: block;
            margin: -10px 0;
            transform: rotate(-5deg);
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255,255,255,0.6);
        }

        .rumba-text {
            font-family: 'Permanent Marker', cursive;
            font-size: 2.5rem;
            color: #ffeb3b;
            margin-top: 10px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255,235,59,0.8);
        }

        .date-box {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: white;
            display: inline-block;
            padding: 5px 20px;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 180, 219, 0.6);
        }

        .price-text {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: #ffeb3b;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255,235,59,0.8);
        }

        .prohibido-text {
            font-size: 1.1rem;
            margin-bottom: 25px;
            display: inline-block;
            animation: float-disco 2.5s ease-in-out infinite;
        }

        @keyframes float-disco {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-5px) rotate(-2deg) scale(1.02); }
            50% { transform: translateY(0) rotate(0deg) scale(1); }
            75% { transform: translateY(5px) rotate(2deg) scale(0.98); }
        }

        .location-text {
            font-weight: 700;
            font-size: 1.5rem;
            line-height: 1.4;
            margin-bottom: 10px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }

        .time-text {
            font-size: 1rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            opacity: 0.95;
        }

        /* ✅ DJ CARLOS - TIPOGRAFÍA SERIA Y DORADA BRILLANTE */
        .dj-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ffd700, #ffea00, #ffcc00, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.8))
                    drop-shadow(0 0 15px rgba(255, 215, 0, 0.5))
                    drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            animation: gold-shine 3s linear infinite;
        }

        @keyframes gold-shine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .organizers {
            font-size: 0.9rem;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        /* Botón de WhatsApp */
        .whatsapp-btn {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            transition: transform 0.3s ease;
        }

        .whatsapp-btn:hover {
            transform: scale(1.1);
            color: white;
        }

        .whatsapp-icon {
            background: linear-gradient(135deg, #25D366, #128C7E);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 8px;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.6);
        }

        .whatsapp-text {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
        }

        @media (max-width: 576px) {
            .party-title { font-size: 2.2rem; }
            .olym-text { font-size: 2.2rem; margin: -5px 0; }
            .rumba-text { font-size: 1.5rem; margin-top: 5px; margin-bottom: 8px; }
            .date-box { font-size: 1rem; padding: 4px 15px; margin-bottom: 10px; }
            .price-text { font-size: 1.8rem; margin-bottom: 3px; }
            .prohibido-text { font-size: 0.9rem; margin-bottom: 15px; }
            .location-text { font-size: 1.1rem; margin-bottom: 5px; }
            .time-text { font-size: 0.85rem; margin-bottom: 8px; letter-spacing: 1px; }
            .dj-name { font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 8px; }
            .organizers { font-size: 0.75rem; margin-bottom: 5px; }
            .whatsapp-icon { width: 50px; height: 50px; font-size: 28px; }
            .whatsapp-text { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="poster-container">
        <img src="imagen/fondo.jpeg" alt="Fondo Party Olym Night" class="bg-image">
        
        <div class="overlay"></div>
        
        <!-- ✅ LLUVIA DE ESTRELLAS (Generado por JS) -->
        <div id="star-container"></div>
        
        <!-- Container para puntos de luz -->
        <div id="disco-floor"></div>
        
        <div class="content">
            
            <p class="top-invite">estas invitad@ a la</p>

            <div class="party-title">
                PARTY
                <span class="olym-text">Olym</span>
                NIGHT
            </div>

            <div class="rumba-text">RUMBA PRIVADA</div>

            <div class="date-box">
                sábado 16 de mayo
            </div>

            <div class="price-text">1$ por persona</div>
            
            <div class="prohibido-text"> Prohibido perdérsela</div>

            <div class="location-text">
                Casalta 2 •<br>
                sector las taparitas • el plan
            </div>

            <div class="time-text">11:00 PM HASTA EL AMANECER</div>

            <div class="dj-name">Dj Carlos</div>

            <div class="organizers">
                ORGANIZADORES:<br>
                Gabriel e'gv • Luisiño e'gv • Carlos e'gv • Luis e'gv
            </div>

            <!-- Botón de WhatsApp -->
            <a href="https://wa.me/04123703500" class="whatsapp-btn" target="_blank">
                <div class="whatsapp-icon">
                    <i class="bi bi-whatsapp"></i>
                </div>
                <span class="whatsapp-text">toca para mas info</span>
            </a>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // ✅ CREAR LLUVIA DE ESTRELLAS
            const starContainer = document.getElementById('star-container');
            const starColors = ['star-blue', 'star-pink', 'star-yellow', 'star-purple', 'star-cyan', 'star-green'];
            
            function createShootingStar() {
                const star = document.createElement('div');
                star.classList.add('shooting-star');
                
                // Color aleatorio
                const randomColor = starColors[Math.floor(Math.random() * starColors.length)];
                star.classList.add(randomColor);
                
                // Posición horizontal aleatoria
                star.style.left = Math.random() * 100 + '%';
                
                // Duración aleatoria (entre 1 y 2 segundos)
                const duration = 1 + Math.random() * 1.5;
                star.style.animationDuration = duration + 's';
                
                // Tamaño variable
                const scale = 0.5 + Math.random() * 1;
                star.style.transform = `scale(${scale})`;
                
                // Delay aleatorio
                star.style.animationDelay = Math.random() * 0.5 + 's';
                
                starContainer.appendChild(star);
                
                // Eliminar estrella después de la animación
                setTimeout(() => {
                    star.remove();
                }, duration * 1000 + 500);
            }

            // Crear estrellas constantemente
            setInterval(createShootingStar, 150); // Nueva estrella cada 150ms

            // Efecto de manchas de luz en el suelo
            const floorContainer = document.getElementById('disco-floor');
            const colors = [
                'rgba(0, 255, 0, 0.8)',
                'rgba(255, 255, 0, 0.8)',
                'rgba(255, 100, 0, 0.8)',
                'rgba(0, 150, 255, 0.8)',
            ];

            const spots = [];
            const numSpots = 8;

            for(let i = 0; i < numSpots; i++) {
                const spot = document.createElement('div');
                spot.classList.add('floor-light');
                spot.style.bottom = Math.random() * 25 + '%';
                spot.style.left = Math.random() * 100 + '%';
                spot.style.width = (60 + Math.random() * 60) + 'px';
                spot.style.height = (30 + Math.random() * 30) + 'px';
                floorContainer.appendChild(spot);
                
                spots.push({
                    element: spot,
                    x: parseFloat(spot.style.left),
                    y: parseFloat(spot.style.bottom),
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.2,
                    colorIndex: Math.floor(Math.random() * colors.length)
                });
            }

            function animate() {
                spots.forEach((spot) => {
                    spot.x += spot.speedX;
                    spot.y += spot.speedY;

                    if(spot.x > 100 || spot.x < 0) spot.speedX *= -1;
                    if(spot.y > 35 || spot.y < 0) spot.speedY *= -1;

                    spot.element.style.left = spot.x + '%';
                    spot.element.style.bottom = spot.y + '%';

                    if (Math.random() < 0.02) {
                        spot.element.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random() * colors.length)]} 0%, transparent 70%)`;
                    }
                });

                requestAnimationFrame(animate);
            }

            animate();

            const elements = document.querySelectorAll('.content > div, .content > p, .content > a');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = `opacity 0.5s ease ${index * 0.1}s, transform 0.5s ease ${index * 0.1}s`;
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100);
            });
        });
    </script>
</body>
</html>
